name: Build iOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable

      - run: flutter pub get

      - name: Disable code signing for CI
        run: |
          cd ios
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS (no codesign)
        run: >
          flutter build ios --release --no-codesign
          --dart-define=FLUTTER_BUILD_NAME=1.0.0
          --dart-define=FLUTTER_BUILD_NUMBER=1

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app
